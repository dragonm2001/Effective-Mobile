services:

  #бэкенд 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: em_backend
    restart: unless-stopped

    expose:
      - "8080"

    networks:
      - app_net

    environment:
      HOST: "0.0.0.0"
      PORT: "8080"

    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >-
          import http.client, sys;
          c = http.client.HTTPConnection('localhost', 8080, timeout=4);
          c.request('HEAD', '/');
          sys.exit(0 if c.getresponse().status == 200 else 1)
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3

  #nginx принимает запросы снаружи и проксирует на бэкенд
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: em_nginx
    restart: unless-stopped

    #единственный порт
    ports:
      - "${NGINX_HOST_PORT:-80}:80"

    networks:
      - app_net

    #nginx стартует только после того, как бэкенд прошёл healthcheck
    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3

#изолированная сеть для двух сервисов
networks:
  app_net:
    name: effective_mobile_net
    driver: bridge
