worker_processes auto;

pid /tmp/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept       on;
    use                epoll;
}

http {
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    #убираем версию nginx из заголовков ответа — незачем светить её наружу
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time upstream=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    #upstream здесь описываем бэкенд.
    upstream backend_pool {
        server backend:8080;

        keepalive 16;
    }

    server {
        listen      80;
        server_name _;  #принимаем любой Host-заголовок

        #весь трафик проксируем на бэкенд
        location / {
            proxy_pass http://backend_pool;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;

            #HTTP/1.1 нужен для корректной работы 
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        #отдельный эндпоинт для healthcheck
        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}
